version: '2'
services:
  loginapi:
    image: loginapi:v2
    container_name: loginapi-v2
    ports:
     - "80:8000"
    environment:
     - .env.prod
    volumes:
     - loginapi-data:/var/lib/docker/volumes/loginapi_data/_data
    networks:
     - loginapi-network
  loginapi-postgres:
    image: postgres:16-alpine
    containe_name: loginapi-postgres-v2
    ports: 
     - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restarts: always
    volumes:
     - loginapi-data:/var/lib/docker/volumes/loginapi_data/_data
    networks:
     - loginapi-network
volumes:
  loginapi-data
networks:
  loginapi-network